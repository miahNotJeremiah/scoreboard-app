<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Basketball Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-glow glow-1"></div>
    <div class="login-glow glow-2"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- Logo / Icon -->
      <div class="login-icon">🏀</div>
      <h1 class="login-title">ScoreBoard Pro</h1>
      <p class="login-subtitle">Basketball Scoreboard – Admin Login</p>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" name="username" placeholder="Enter username" autocomplete="off" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Sign In
        </button>
      </form>

      <p class="login-hint">Default: <code>admin</code> / <code>password123</code></p>

      <a href="/scoreboard" class="link-secondary">👁 View Live Scoreboard (No Login)</a>
    </div>
  </div>

</body>
</html>
