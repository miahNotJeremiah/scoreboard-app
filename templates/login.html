<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Basketball Scoreboard</title>

</head>
<body>

  <h1>🏀 Basketball Scoreboard – Login</h1>

  {% if error %}
    <div class="alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <p>
      <label for="username">Username:</label><br>
      <input id="username" type="text" name="username" autocomplete="off" required />
    </p>
    <p>
      <label for="password">Password:</label><br>
      <input id="password" type="password" name="password" required />
    </p>
    <button type="submit" id="login-btn">Sign In</button>
  </form>

  <p>Default: <code>admin</code> / <code>password123</code></p>
  <p><a href="/scoreboard">View Live Scoreboard (No Login)</a></p>

</body>
</html>
