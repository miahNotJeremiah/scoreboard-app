<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Setup – Basketball Scoreboard</title>
</head>
<body>

  <h1>Game Setup</h1>
  <nav>
    <a href="/admin">← Admin Panel</a> |
    <a href="/logout">Logout</a>
  </nav>
  <p>Configure teams and players before the game starts.</p>

  <hr>

  <form method="POST" action="/setup">

    <div class="setup-teams-grid">

      <!-- Team 1 -->
      <div>
        <h2>Team 1</h2>
        <p>
          <label for="team1_name">Team Name:</label><br>
          <input id="team1_name" type="text" name="team1_name" value="{{ game.team1.name }}" placeholder="Team Alpha" required />
        </p>
        <p>
          <label for="team1_color">Team Colour:</label>
          <input id="team1_color" type="color" name="team1_color" value="{{ game.team1.color }}" />
        </p>

        <h3>Players (up to 5)</h3>
        {% for i in range(1, 6) %}
        <div class="player-setup-row">
          <input type="text" name="team1_player{{ i }}"
                 value="{{ game.team1.players[i-1].name if game.team1.players|length >= i else '' }}"
                 placeholder="Player {{ i }} name"
                 id="t1p{{ i }}-name" />
          <input type="text" name="team1_number{{ i }}"
                 value="{{ game.team1.players[i-1].number if game.team1.players|length >= i else '' }}"
                 placeholder="#" class="number-input"
                 id="t1p{{ i }}-number" />
        </div>
        {% endfor %}
      </div>

      <!-- Team 2 -->
      <div>
        <h2>Team 2</h2>
        <p>
          <label for="team2_name">Team Name:</label><br>
          <input id="team2_name" type="text" name="team2_name" value="{{ game.team2.name }}" placeholder="Team Beta" required />
        </p>
        <p>
          <label for="team2_color">Team Colour:</label>
          <input id="team2_color" type="color" name="team2_color" value="{{ game.team2.color }}" />
        </p>

        <h3>Players (up to 5)</h3>
        {% for i in range(1, 6) %}
        <div class="player-setup-row">
          <input type="text" name="team2_player{{ i }}"
                 value="{{ game.team2.players[i-1].name if game.team2.players|length >= i else '' }}"
                 placeholder="Player {{ i }} name"
                 id="t2p{{ i }}-name" />
          <input type="text" name="team2_number{{ i }}"
                 value="{{ game.team2.players[i-1].number if game.team2.players|length >= i else '' }}"
                 placeholder="#" class="number-input"
                 id="t2p{{ i }}-number" />
        </div>
        {% endfor %}
      </div>

    </div>

    <hr>

    <h2>Settings</h2>

    <p>
      <label>
        <input type="checkbox" name="buzzer" value="on" {{ 'checked' if game.get('settings', {}).get('buzzer', True) else '' }} />
        End of period buzzer
      </label>
    </p>
    <p>
      <label>
        <input type="checkbox" name="whistle" value="on" {{ 'checked' if game.get('settings', {}).get('whistle', False) else '' }} />
        Referee whistle SFX on fouls
      </label>
    </p>
    <p>
      <label>
        <input type="checkbox" name="shot_clock_warning" value="on" {{ 'checked' if game.get('settings', {}).get('shot_clock_warning', True) else '' }} />
        Shot clock warning (final 5s)
      </label>
    </p>
    <p>
      <label>
        <input type="checkbox" name="high_contrast" value="on" {{ 'checked' if game.get('settings', {}).get('high_contrast', False) else '' }} />
        High contrast mode
      </label>
    </p>

    <p>
      Default period duration:
      <label><input type="radio" name="period_duration" value="10" {{ 'checked' if game.get('settings', {}).get('period_duration', '10') == '10' else '' }} /> 10:00</label>
      <label><input type="radio" name="period_duration" value="12" {{ 'checked' if game.get('settings', {}).get('period_duration', '10') == '12' else '' }} /> 12:00</label>
      <label><input type="radio" name="period_duration" value="15" {{ 'checked' if game.get('settings', {}).get('period_duration', '10') == '15' else '' }} /> 15:00</label>
      <label><input type="radio" name="period_duration" value="custom" {{ 'checked' if game.get('settings', {}).get('period_duration', '10') == 'custom' else '' }} /> Custom</label>
    </p>

    <hr>

    <button type="submit" id="save-setup-btn">💾 Save &amp; Start Game</button>

  </form>

</body>
</html>
